{% extends "base.html" %}
{% block title %}模拟盘 - Quant Monitor{% endblock %}
{% block content %}

<!-- 涨停 Top-5 -->
<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div>
        <h2 style="color:#e65100;margin-bottom:4px;">涨停 Top-5</h2>
        <p style="color:#888;font-size:11px;margin:0 0 10px 0;">
            5条件规则筛选 · 日频调仓 · account=1 · run=1
        </p>
        <div hx-get="/api/paper-run/1?account_id=1" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>
    <div>
        <h2 style="color:#6a1b9a;margin-bottom:4px;">大小票 v4.0</h2>
        <p style="color:#888;font-size:11px;margin:0 0 10px 0;">
            涨停+ML双引擎 · 动态分配 · account=2 · run=2
        </p>
        <div hx-get="/api/paper-run/2?account_id=2" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>
</div>

{% endblock %}
