{% extends "base.html" %}
{% block title %}模拟盘 - Quant Monitor{% endblock %}
{% block content %}
<div class="card">
    <h3>模拟盘监控</h3>
    <p style="color:#888;font-size:13px;margin-bottom:12px;">
        模拟盘在后台独立运行：每日收盘后计算因子 → 模型预测/事件扫描 → 选股下单 → 结果写 DB。
        Web 端只读展示运行状态、持仓和信号。
    </p>

    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px;">
        <select id="paper-strategy">
            <option value="ML-默认集成">ML-默认集成</option>
            <option value="ML-动量精选">ML-动量精选</option>
            <option value="ML-反转精选">ML-反转精选</option>
        </select>
        <input id="paper-capital" value="1000000" placeholder="初始资金" style="width:120px;">
        <input id="paper-start" placeholder="起始日 (如2026-01-01)" style="width:150px;">
        <button class="mock-button green"
                onclick="var s=document.getElementById('paper-strategy').value;var c=document.getElementById('paper-capital').value;var d=document.getElementById('paper-start').value;var params='strategy='+encodeURIComponent(s)+'&capital='+c;if(d)params+='&start_date='+d;fetch('/api/paper/create?'+params,{method:'POST'}).then(function(r){return r.text()}).then(function(html){document.getElementById('paper-msg').innerHTML=html;});">
            创建模拟盘
        </button>
    </div>
    <div id="paper-msg"></div>
</div>

<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div>
        <h2 style="color:#1976d2;margin-bottom:12px;">舞 (ML因子选股)</h2>
        <div hx-get="/api/paper-run/2?account_id=15" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>
    <div>
        <h2 style="color:#e65100;margin-bottom:12px;">小市 (事件驱动)</h2>
        <div hx-get="/api/paper-run/3?account_id=16" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>
</div>
{% endblock %}
