{% extends "base.html" %}
{% block title %}回测对比 - Quant Monitor{% endblock %}
{% block content %}

<!-- 策略概览卡片 -->
<div id="strategy-cards" hx-get="/api/strategy-summary" hx-trigger="load">
    <p style="color:#999;">加载中...</p>
</div>

<!-- 回测详情面板 -->
<div id="detail-panel" style="display:none;">
</div>

<!-- 历史记录列表 -->
<div class="card" style="margin-top:8px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;">回测记录</h3>
        <div style="display:flex;gap:8px;">
            <select name="strategy"
                    hx-get="/api/backtest-list" hx-trigger="change"
                    hx-target="#bt-table" hx-swap="innerHTML">
                <option value="">全部策略</option>
                <option value="舞">舞 (ML大票)</option>
                <option value="小市值alpha">小市值alpha (ML小票)</option>
                <option value="涨停策略">涨停策略 (规则筛选)</option>
                <option value="大小票平滑分配">大小票平滑分配</option>
            </select>
        </div>
    </div>

    <div id="bt-table" hx-get="/api/backtest-list?quality=valid" hx-trigger="load">
        <p style="color:#999;">加载中...</p>
    </div>
</div>
{% endblock %}
