{% extends "base.html" %}
{% block content %}
<div class="card">
    <h3>数据状态</h3>
    <button class="mock-button" hx-post="/api/sync/trigger" hx-target="#sync-log" hx-swap="innerHTML"
            style="background:#1b5e20;color:#66bb6a;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-bottom:16px;">
        手动触发同步
    </button>
    <div id="sync-log"></div>
</div>
<div class="card" hx-get="/api/data-status" hx-trigger="load" hx-swap="innerHTML">
    <p>加载中...</p>
</div>
{% endblock %}
