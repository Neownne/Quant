{% extends "base.html" %}
{% block title %}数据状态 - Quant Monitor{% endblock %}
{% block content %}
<div class="card">
    <h3>数据状态</h3>
    <button class="mock-button green" hx-post="/api/sync/trigger" hx-target="#sync-log" hx-swap="innerHTML"
            style="margin-bottom:16px;">
        手动触发同步
    </button>
    <div id="sync-log"></div>
</div>
<div class="card" hx-get="/api/data-status" hx-trigger="load" hx-swap="innerHTML">
    <p style="color:#999;">加载中...</p>
</div>
{% endblock %}
